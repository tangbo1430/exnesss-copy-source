<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exness Personal Area</title>
    <meta
      name="description"
      content="Static front-end demo for a broker personal area interface. No real authentication or data transmission."
    />
    <script>
      (function () {
        var mode = localStorage.getItem("exness-theme-mode") || "system";
        var dark =
          mode === "dark" ||
          (mode === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
