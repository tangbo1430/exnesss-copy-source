<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exness Personal Area</title>
    <meta
      name="description"
      content="Static front-end demo for a broker personal area interface. No real authentication or data transmission."
    />
    <script>
      (function () {
        // 生产域名须走 HTTPS，否则 Secure Cookie 无法写入，跨子域 SSO 会失败
        if (
          location.protocol === "http:" &&
          (location.hostname === "exness.daboluo.pro" || location.hostname.endsWith(".exness.daboluo.pro"))
        ) {
          location.replace(
            "https://" + location.host + location.pathname + location.search + location.hash
          );
          return;
        }
        var mode = localStorage.getItem("exness-theme-mode") || "system";
        var dark =
          mode === "dark" ||
          (mode === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
